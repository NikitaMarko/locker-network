version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Переходим в папку фронтенда и устанавливаем зависимости
        - cd frontend
        - npm install
    build:
      commands:
        # Запускаем скрипт сборки
        - npm run build
  artifacts:
    # Указываем, где лежит результат сборки относительно корня
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*