name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS_BE credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_BE_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_BE_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_BE_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_BE_REGION }} | \
          docker login --username AWS_BE --password-stdin \
          ${{ vars.AWS_BE_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_BE_REGION }}.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ vars.AWS_BE_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_BE_REGION }}.amazonaws.com/${{ vars.ECR_BE_REPOSITORY }}:latest \
            --push .

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_BE_CLUSTER }} \
            --service ${{ vars.ECS_BE_SERVICE }} \
            --force-new-deployment