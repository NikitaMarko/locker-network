version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Переходим в папку фронтенда и устанавливаем зависимости
        - cd frontend
        - npm install
    build:
      commands:
        # Запускаем скрипт сборки
        - echo "VITE_API_URL_CLOUDFRONT=$VITE_API_URL_CLOUDFRONT" >> .env
        - echo "VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID" >> .env

        - npm run build
  artifacts:
    # Указываем, где лежит результат сборки относительно корня
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*