AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Locker Network Lambda Functions

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl
        NODE_ENV: !Ref Environment

Parameters:
  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection string
    NoEcho: true
    Default: "placeholder"
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  StripeSecretKey:
    Type: String
    Description: Stripe API secret key
    NoEcho: true
    Default: "sk_test_placeholder"

Resources:
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub locker-${Environment}-health-check
      Handler: dist/functions/healthCheck.handler
      CodeUri: .
      Description: Returns status and uptime
      Events:
        HttpGet:
          Type: Api
          Properties:
            Path: /health
            Method: get
    # ── SQS Queue ──
  OperationsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub locker-${Environment}-operations-queue
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400

  # ── DynamoDB Table ──
  OperationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub locker-${Environment}-operations-dynamodb
      AttributeDefinitions:
        - AttributeName: operationId
          AttributeType: S
      KeySchema:
        - AttributeName: operationId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # ── Command Handler Lambda (triggered by SQS) ──
  CommandHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub locker-${Environment}-command-handler
      Handler: dist/functions/operations/commandHandler.handler
      CodeUri: .
      Description: Reads commands from SQS and routes to services
      Environment:
        Variables:
          OPERATIONS_TABLE: !Ref OperationsTable
          BOOKING_TABLE: !Ref BookingTable
          LOCKER_CACHE_TABLE: !Ref LockerCacheTable
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          FRONTEND_BASE_URL: "https://main.d3vb1066jloxjy.amplifyapp.com"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OperationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BookingTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LockerCacheTable
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt OperationsQueue.Arn
            BatchSize: 1
   # ── Cache Projection SQS Queue ──
  CacheProjectionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub locker-${Environment}-cache-projection
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400
 
  # ── Locker Cache DynamoDB Table ──
  LockerCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub locker-${Environment}-locker-cache
      AttributeDefinitions:
        - AttributeName: lockerBoxId
          AttributeType: S
        - AttributeName: stationId
          AttributeType: S
      KeySchema:
        - AttributeName: lockerBoxId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: stationId-index
          KeySchema:
            - AttributeName: stationId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST

  # ── Booking DynamoDB Table ──
  BookingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub locker-${Environment}-booking
      AttributeDefinitions:
        - AttributeName: bookingId
          AttributeType: S
      KeySchema:
        - AttributeName: bookingId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
 
  # ── Cache Projection Handler Lambda ──
  CacheProjectionHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub locker-${Environment}-cache-projection-handler
      Handler: dist/functions/cache/cacheProjectionHandler.handler
      CodeUri: .
      Description: Processes locker cache projection events from SQS
      Environment:
        Variables:
          LOCKER_CACHE_TABLE: !Ref LockerCacheTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LockerCacheTable
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt CacheProjectionQueue.Arn
            BatchSize: 10
 
Outputs:
  HealthCheckApi:
    Description: Health Check endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/health
  OperationsQueueUrl:
    Description: SQS URL for operations
    Value: !Ref OperationsQueue
  OperationsQueueArn:
    Description: SQS ARN for operations
    Value: !GetAtt OperationsQueue.Arn
  OperationsTableName:
    Description: DynamoDB table name
    Value: !Ref OperationsTable
  CacheProjectionQueueUrl:
    Description: SQS URL for cache projections
    Value: !Ref CacheProjectionQueue
  CacheProjectionQueueArn:
    Description: SQS ARN for cache projections
    Value: !GetAtt CacheProjectionQueue.Arn
  LockerCacheTableName:
    Description: DynamoDB table for locker cache
    Value: !Ref LockerCacheTable
  BookingTableName:
    Description: DynamoDB table for bookings
    Value: !Ref BookingTable