AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Locker Network Lambda Functions

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl
        NODE_ENV: !Ref Environment

Parameters:
  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection string
    NoEcho: true
    Default: "placeholder"
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: nodejs20.x
    Properties:
      FunctionName: !Sub locker-${Environment}-health-check
      Handler: dist/functions/healthCheck.handler
      CodeUri: .
      Description: Returns status and uptime
      Events:
        HttpGet:
          Type: Api
          Properties:
            Path: /health
            Method: get

Outputs:
  HealthCheckApi:
    Description: Health Check endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/health